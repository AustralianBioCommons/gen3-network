name: Deploy network (reusable)

on:
  workflow_call:
    inputs:
      config_path:
        description: Path to config file in caller repo
        required: true
        type: string

      github_environment:
        description: GitHub Environment name (uat, prod, etc.)
        required: true
        type: string

      role_to_assume:
        description: AWS IAM role ARN for OIDC
        required: true
        type: string

      aws_region:
        description: Default AWS region (fallback)
        required: false
        type: string
        default: ap-southeast-2

      stack_selector:
        description: CDK stack selector
        required: false
        type: string
        default: --all

      caller_ref:
        description: Optional git ref for caller repo
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.github_environment }}

    concurrency:
      group: network-${{ github.repository }}-${{ inputs.github_environment }}
      cancel-in-progress: false

    steps:
      # ----------------------------------------
      # Checkout caller repo (project-specific)
      # ----------------------------------------
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.caller_ref != '' && inputs.caller_ref || github.ref }}
          path: caller

      # ----------------------------------------
      # Checkout reusable CDK repo
      # ----------------------------------------
      - name: Checkout gen3-network repo
        uses: actions/checkout@v4
        with:
          repository: your-org/gen3-network
          ref: main
          path: network

      # ----------------------------------------
      # Configure AWS (OIDC)
      # ----------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_to_assume }}
          aws-region: ${{ inputs.aws_region }}

      # ----------------------------------------
      # Get actual AWS account ID
      # ----------------------------------------
      - name: Resolve AWS account ID
        id: aws_identity
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      # ----------------------------------------
      # Setup Node
      # ----------------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: network/package-lock.json

      # ----------------------------------------
      # Build runtime config
      # ----------------------------------------
      - name: Build runtime config
        env:
          INPUT_CONFIG: caller/${{ inputs.config_path }}
          OUTPUT_CONFIG: network/config.runtime.json
          AWS_ACCOUNT_ID: ${{ steps.aws_identity.outputs.account_id }}
          AWS_REGION: ${{ inputs.aws_region }}
        run: |
          node <<'NODE'
          const fs = require("fs");

          const inputPath = process.env.INPUT_CONFIG;
          const outputPath = process.env.OUTPUT_CONFIG;
          const accountId = process.env.AWS_ACCOUNT_ID;
          const defaultRegion = process.env.AWS_REGION;

          const config = JSON.parse(fs.readFileSync(inputPath, "utf8"));

          if (!config.environments) {
            throw new Error("config.environments is required");
          }

          for (const [key, env] of Object.entries(config.environments)) {
            // Inject account if placeholder or missing
            if (!env.account || env.account === "__ACCOUNT_ID__") {
              env.account = accountId;
            }

            // Inject region if missing
            if (!env.region) {
              env.region = defaultRegion;
            }

            config.environments[key] = env;
          }

          fs.writeFileSync(outputPath, JSON.stringify(config, null, 2));
          console.log("Runtime config written to", outputPath);
          NODE

      # ----------------------------------------
      # Install dependencies
      # ----------------------------------------
      - name: Install dependencies
        working-directory: network
        run: npm ci

      # ----------------------------------------
      # CDK synth
      # ----------------------------------------
      - name: CDK synth
        working-directory: network
        run: npx cdk synth -c config=./config.runtime.json

      # ----------------------------------------
      # CDK deploy
      # ----------------------------------------
      - name: CDK deploy
        working-directory: network
        run: |
          npx cdk deploy ${{ inputs.stack_selector }} \
            --require-approval never \
            -c config=./config.runtime.json
